name: Deploy TDX MCP Server

on:
  push:
    branches: [ main, AzureDeployment ]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: TDX-MCP
  AZURE_WEBAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '24.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Build TypeScript
      - name: Build TypeScript
        run: npm run build

      # Prepare deployment package (dist folder only)
      - name: Prepare deployment package
        run: |
          mkdir -p deploy-pkg
          cp -r dist deploy-pkg/
          cp package.json deploy-pkg/
          cp package-lock.json deploy-pkg/
          cd deploy-pkg && zip -r ../tdx-mcp-deploy.zip .

      # Deploy to Azure App Service using publish profile
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: tdx-mcp-deploy.zip

      # Stream logs after deployment
      - name: Azure CLI - Get deployment status
        uses: azure/CLI@v2
        with:
          inlineScript: |
            echo "Deployment complete. App: ${{ env.AZURE_WEBAPP_NAME }}"
            az webapp show -n ${{ env.AZURE_WEBAPP_NAME }} -g TDX_MCP --query "{state:state, defaultHostName:defaultHostName}" -o json
