name: Deploy to QA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            package.json
            package-lock.json
            .env.example
          retention-days: 1

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./build-to-deploy

      - name: Deploy to QA via WinRM
        shell: pwsh
        env:
          DMZ_WINRM_HOST: ${{ secrets.DMZ_WINRM_HOST }}
          DMZ_WINRM_USERNAME: ${{ secrets.DMZ_WINRM_USERNAME }}
          DMZ_WINRM_PASSWORD: ${{ secrets.DMZ_WINRM_PASSWORD }}
          TDX_BASE_URL: ${{ secrets.TDX_BASE_URL }}
          TDX_BEID: ${{ secrets.TDX_BEID }}
          TDX_WEB_SERVICES_KEY: ${{ secrets.TDX_WEB_SERVICES_KEY }}
          TDX_APP_ID: ${{ secrets.TDX_APP_ID }}
        run: |
          # Create secure credentials for WinRM connection
          $secPassword = ConvertTo-SecureString $env:DMZ_WINRM_PASSWORD -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential ($env:DMZ_WINRM_USERNAME, $secPassword)
          
          # Establish WinRM session to QA server
          $sessionParams = @{
              ComputerName = $env:DMZ_WINRM_HOST
              Credential = $credential
              ErrorAction = "Stop"
          }
          
          Write-Host "Establishing WinRM session to QA server: $env:DMZ_WINRM_HOST"
          $session = New-PSSession @sessionParams
          
          try {
              # Copy build artifacts to QA server
              Write-Host "Copying build artifacts to QA server..."
              Copy-Item -Path ".\build-to-deploy\*" -Destination "E:\Websites\PASCO-TDX-MCP\" -ToSession $session -Recurse -Force
              Write-Host "✓ Build artifacts copied successfully"
              
              # Execute deployment on remote server
              Write-Host "Executing deployment on QA server..."
              Invoke-Command -Session $session -ScriptBlock {
                  param([string]$BaseUrl, [string]$Beid, [string]$WebServicesKey, [string]$AppId)
                  
                  $deploymentDir = "E:\Websites\PASCO-TDX-MCP"
                  
                  # Stop any running Node processes
                  Stop-Process -Name node -Force -ErrorAction SilentlyContinue
                  Start-Sleep -Seconds 1
                  
                  # Create .env file with TDX credentials
                  Write-Host "Creating .env file..."
                  $envContent = @"
TDX_BASE_URL=$BaseUrl
TDX_BEID=$Beid
TDX_WEB_SERVICES_KEY=$WebServicesKey
TDX_APP_ID=$AppId
"@
                  Set-Content -Path "$deploymentDir\.env" -Value $envContent -Force
                  
                  # Restrict .env file permissions
                  $acl = Get-Acl "$deploymentDir\.env"
                  $acl.SetAccessRuleProtection($true, $false)
                  $acl.Access | ForEach-Object { $acl.RemoveAccessRule($_) }
                  $identity = [System.Security.Principal.WindowsIdentity]::GetCurrent()
                  $rule = New-Object System.Security.AccessControl.FileSystemAccessRule($identity.User, "FullControl", "Allow")
                  $acl.AddAccessRule($rule)
                  Set-Acl -Path "$deploymentDir\.env" -AclObject $acl
                  Write-Host "✓ .env file created with restricted permissions"
                  
                  # Install production dependencies
                  Write-Host "Installing production dependencies..."
                  Push-Location $deploymentDir
                  npm install --production
                  if ($LASTEXITCODE -ne 0) { throw "npm install failed" }
                  Write-Host "✓ Dependencies installed"
                  
                  # Start Node.js application
                  Write-Host "Starting Node.js application..."
                  $nodeProcess = Start-Process -FilePath "cmd.exe" -ArgumentList "/c npm start" -WindowStyle Hidden -PassThru
                  Start-Sleep -Seconds 3
                  
                  if (Get-Process -Id $nodeProcess.Id -ErrorAction SilentlyContinue) {
                      Write-Host "✓ Node.js started (PID: $($nodeProcess.Id))"
                  } else {
                      throw "Node.js failed to start"
                  }
                  Pop-Location
              } -ArgumentList $env:TDX_BASE_URL, $env:TDX_BEID, $env:TDX_WEB_SERVICES_KEY, $env:TDX_APP_ID
              
              Write-Host "✓ Deployment completed successfully"
          } catch {
              Write-Host "✗ Deployment failed: $_" -ForegroundColor Red
              throw
          } finally {
              Remove-PSSession -Session $session -ErrorAction SilentlyContinue
          }

      - name: Run smoke tests
        shell: pwsh
        env:
          QA_SERVER_URL: ${{ secrets.QA_SERVER_URL }}
        run: |
          Write-Host "Running smoke tests against $env:QA_SERVER_URL"
          Start-Sleep -Seconds 5  # Give server time to stabilize
          
          try {
              $response = Invoke-WebRequest -Uri "$env:QA_SERVER_URL/PASCO-TDX-MCP/" `
                  -UseBasicParsing -TimeoutSec 15 -SkipCertificateCheck
              
              if ($response.StatusCode -eq 200) {
                  Write-Host "✓ MCP server responding at $env:QA_SERVER_URL/PASCO-TDX-MCP/"
              } else {
                  Write-Host "✗ Unexpected status code: $($response.StatusCode)"
                  exit 1
              }
          } catch {
              Write-Host "⚠ Smoke test warning: $_"
              Write-Host "This may be normal if IIS/Node.js is still starting up"
          }
          
          Write-Host "✓ Deployment workflow completed"
