name: Deploy to QA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Create deployment archive
        run: |
          mkdir -p deploy-artifact
          cp -r dist deploy-artifact/
          cp package.json deploy-artifact/
          cp package-lock.json deploy-artifact/
          cp .env.example deploy-artifact/
          cd deploy-artifact
          tar -czf ../tdx-mcp-build.tar.gz .
          cd ..

      - name: Deploy to QA via WinRM
        shell: pwsh
        env:
          DMZ_WINRM_HOST: ${{ secrets.DMZ_WINRM_HOST }}
          DMZ_WINRM_USERNAME: ${{ secrets.DMZ_WINRM_USERNAME }}
          DMZ_WINRM_PASSWORD: ${{ secrets.DMZ_WINRM_PASSWORD }}
          TDX_BASE_URL: ${{ secrets.TDX_BASE_URL }}
          TDX_BEID: ${{ secrets.TDX_BEID }}
          TDX_WEB_SERVICES_KEY: ${{ secrets.TDX_WEB_SERVICES_KEY }}
          TDX_APP_ID: ${{ secrets.TDX_APP_ID }}
        run: |
          # Create secure credentials object
          $secPassword = ConvertTo-SecureString $env:DMZ_WINRM_PASSWORD -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential ($env:DMZ_WINRM_USERNAME, $secPassword)
          
          # Build deployment script parameters
          $deployParams = @{
              ComputerName = $env:DMZ_WINRM_HOST
              Credential = $credential
              ScriptBlock = {
                  param(
                      [string]$TDXBaseUrl,
                      [string]$TDXBeid,
                      [string]$TDXWebServicesKey,
                      [string]$TDXAppId,
                      [string]$ArchiveUrl
                  )
                  
                  # Set variables for deployment script
                  $deploymentDir = "E:\Websites\PASCO-TDX-MCP"
                  $scriptPath = "$PSScriptRoot\scripts\deploy.ps1"
                  
                  # Run local deployment script
                  & $scriptPath `
                      -DeploymentDir $deploymentDir `
                      -TDXBaseUrl $TDXBaseUrl `
                      -TDXBeid $TDXBeid `
                      -TDXWebServicesKey $TDXWebServicesKey `
                      -TDXAppId $TDXAppId `
                      -ArchiveUrl $ArchiveUrl
              }
              ArgumentList = $env:TDX_BASE_URL, $env:TDX_BEID, $env:TDX_WEB_SERVICES_KEY, $env:TDX_APP_ID, "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/tdx-mcp-build.tar.gz"
          }
          
          Write-Host "Connecting to QA server: $env:DMZ_WINRM_HOST"
          Invoke-Command @deployParams

      - name: Run smoke tests
        shell: pwsh
        env:
          QA_SERVER_URL: ${{ secrets.QA_SERVER_URL }}
        run: |
          Write-Host "Running smoke tests against $env:QA_SERVER_URL"
          # Simple connectivity test
          try {
              $response = Invoke-WebRequest -Uri "$env:QA_SERVER_URL/PASCO-TDX-MCP/" -UseBasicParsing -TimeoutSec 10
              if ($response.StatusCode -eq 200) {
                  Write-Host "✓ MCP server is responding"
              } else {
                  Write-Host "✗ Unexpected status code: $($response.StatusCode)"
                  exit 1
              }
          } catch {
              Write-Host "✗ Failed to reach MCP server: $_"
              exit 1
          }
